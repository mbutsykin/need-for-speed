packages:
  - "apps/*"
  - "packages/*"

allowBuilds:
  unrs-resolver: true

# Shared dependency versions. Reference with "catalog:" in any package.json.
# https://pnpm.io/catalogs
catalog:
  "@types/node": ^26.1.1
  eslint: ^9.39.4
  prettier: ^3.9.5
  # TypeScript 7 (native) isn't yet supported by typescript-eslint 8 / ts-jest;
  # stay on 5.x to match the apps until the toolchain catches up.
  typescript: ^5.7.3
